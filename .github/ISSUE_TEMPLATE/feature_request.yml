name: Feature Request
description: Suggest an idea or enhancement for Pelagica
title: '[FEATURE] '
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Is there an existing feature request for this?
      description: Please [search here](https://github.com/PelagicaApp/pelagica/issues?q=is%3Aissue) to see if someone else has already suggested this.
      options:
        - label: I have searched the existing issues before opening this feature request.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: I would like Pelagica to...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Describe it here.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or behavior you'd like.
      placeholder: It would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
      placeholder: I also considered...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
    validations:
      required: false